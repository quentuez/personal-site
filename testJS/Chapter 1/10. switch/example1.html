<!DOCTYPE html>
<script>
    let a = 2 + 22;

    switch (a) {
        case 3:
            alert('Маловато');
            break;
        case 4:
            alert('В точку!');
            break;
        case 5:
            alert('Перебор');
            break;
        default:
            alert("Нет таких значений");
    }
</script>
