<!DOCTYPE html>

<head>
    <meta charset="utf-8">
    <title>first-of-type</title>
    <style>
        table {
            border-collapse: collapse;
            /* Убираем двойные границы */
            width: 100%;
            /* Ширина таблицы */
            border-spacing: 0;
            /* Расстояние между ячеек */
        }

        td {
            border: 1px solid #6A3E14;
            /* Параметры рамки */
            padding: 4px;
            /* Поля в ячейках */
        }

        tr:first-of-type {
            background: #0b940b;
            /* Цвет фона */
            color: #fff;
            /* Цвет текст */
        }

        td:first-of-type {
            background: #cc0ec3;
            /* Цвет фона */
        }
    </style>
</head>

<body>
    <table>
        <tr>
            <td>&nbsp;</td>
            <td>1998</td>
            <td>1999</td>
            <td>2000</td>
            <td>2001</td>
            <td>2002</td>
            <td>2003</td>
        </tr>
        <tr>
            <td>Нефть</td>
            <td>3</td>
            <td>22</td>
            <td>34</td>
            <td>62</td>
            <td>74</td>
            <td>57</td>
        </tr>
        <tr>
            <td>Золото</td>
            <td>4</td>
            <td>13</td>
            <td>69</td>
            <td>72</td>
            <td>56</td>
            <td>47</td>
        </tr>
        <tr>
            <td>Дерево</td>
            <td>4</td>
            <td>7</td>
            <td>73</td>
            <td>79</td>
            <td>34</td>
            <td>86</td>
        </tr>
    </table>
</body>

</html>
