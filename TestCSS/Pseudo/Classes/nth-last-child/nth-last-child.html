<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>nth-last-child</title>
    <style>
        table {
            width: 100%;
            /* Ширина таблицы */
            border-collapse: collapse;
            /* Убираем двойные границы */
            border-spacing: 0;
            /* Расстояние между ячейками */
        }

        td {
            border: 1px solid #333;
            /* Параметры рамки */
            padding: 3px;
            /* Поля в ячейках */
            border-left: 3px double #333;
            /* Граница слева */
        }

        td:nth-last-child(2n+1) {
            background: #e60505;
            /* Цвет фона */
        }

        td:nth-child(1) {
            border: 1px solid #333;
            /* Параметры рамки */
            background: #cfc;
            /* Цвет фона */
        }
    </style>
</head>

<body>
    <table>
        <tr>
            <td>&nbsp;</td>
            <td>2134</td>
            <td>2135</td>
            <td>2136</td>
            <td>2137</td>
            <td>2138</td>
        </tr>
        <tr>
            <td>Нефть</td>
            <td>16</td>
            <td>34</td>
            <td>62</td>
            <td>74</td>
            <td>57</td>
        </tr>
        <tr>
            <td>Золото</td>
            <td>4</td>
            <td>69</td>
            <td>72</td>
            <td>56</td>
            <td>47</td>
        </tr>
        <tr>
            <td>Дерево</td>
            <td>7</td>
            <td>73</td>
            <td>79</td>
            <td>34</td>
            <td>86</td>
        </tr>
        <tr>
            <td>Камни</td>
            <td>23</td>
            <td>34</td>
            <td>88</td>
            <td>53</td>
            <td>103</td>
        </tr>
    </table>
</body>

</html>
