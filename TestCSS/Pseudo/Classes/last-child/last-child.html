<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>last-child</title>
    <style>
        .block {
            background: #7da7d9;
            /* Цвет фона */
            color: #fff;
            /* Цвет текста */
        }

        .block :first-child {
            padding: 10px;
            /*  Поля вокруг текста */
        }

        .block :last-child {
            background-color: red;
            /* Параметры фона */
            height: 5px;
            /* Высота блока */
        }
    </style>
</head>

<body>
    <div class="block">
        <div>
            При истечении возможности понимания вышеизложенной информации вы
            имеете объективную возможность подать официальный запрос главному
            субординатору локальной виртуальной вселенной.
        </div>
        <div></div>
    </div>
</body>

</html>
