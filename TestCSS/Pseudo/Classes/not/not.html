<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>not</title>
    <style>
        input:not([type="submit"]) {
            border: 1px solid rgb(219, 1, 1);
            padding: 3px;
        }
    </style>
</head>

<body>
    <form>
        <p>Ваше имя: <input name="user"></p>
        <p>Прилагаемый файл: <input type="file" name="file"></p>
        <p><input type="submit" value="Отправить"></p>
    </form>
</body>

</html>
