<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>:optional</title>
    <style>
        input:optional {
            opacity: 0.5;
            /* Полупрозрачность */
        }
    </style>
</head>

<body>
    <form>
        <p>Пожалуйста, укажите ваше имя и возраст.</p>
        <p>Имя: <input name="name"></p>
        <p>Возраст: <input type="number" min="18" required name="old"></p>
        <p><input type="submit" value="Отправить"></p>
    </form>
</body>

</html>
