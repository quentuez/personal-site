<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>nth-of-type</title>
    <style>
        img:nth-of-type(2n+1) {
            float: left;
        }

        img:nth-of-type(2n) {
            float: right;
        }
    </style>
</head>

<body>
    <p><img src="../nth-of-type/left.gif" alt="">
        <img src="../nth-of-type/right.gif" alt="">
    </p>
    <h1>Исторический турнир</h1>
</body>

</html>
