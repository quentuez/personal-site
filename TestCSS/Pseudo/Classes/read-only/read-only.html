<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>:read-only</title>
    <style>
        input:read-only {
            opacity: 0.3;
            /* Полупрозрачность */
        }
    </style>
</head>

<body>
    <form>
        <p><input type="text" name="comment" size="40" value="Введенный текст не может изменяться" readonly></p>
        <p><input type="submit" value="Отправить"></p>
    </form>
</body>

</html>
