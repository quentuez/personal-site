<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>:invalid</title>
    <style>
        input:invalid {
            background: rgb(202, 26, 26);
            /* Красный цвет фона */
        }

        input:valid {
            background: rgb(17, 155, 17);
            /* Зеленый цвет фона */
        }
    </style>
</head>

<body>
    <form>
        <p>Адрес сайта</p>
        <p><input type="url" required></p>
        <p>Адрес электронной почты</p>
        <p><input type="email" required></p>
        <p><input type="submit" value="Отправить" /></p>
    </form>
</body>

</html>
