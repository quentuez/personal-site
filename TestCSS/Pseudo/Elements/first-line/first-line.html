<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>first-line</title>
    <style>
        p::first-line {
            color: red;
            /* Красный цвет текста */
            font-style: italic;
            /* Курсивное начертание */
            font-weight: bold;
            /* Жирное начертание */
        }
    </style>
</head>

<body>
    <p>Олимпия 2008<br />
        Основной претендент на I место это конечно же Джей Катлер, достигший наивысшего
        результата за последние два года.</p>
</body>

</html>
